# Test profile — uses same local Docker services but isolated test DB
spring.datasource.url=jdbc:postgresql://localhost:5432/grid07db_test
spring.datasource.username=grid07user
spring.datasource.password=grid07pass

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Faster sweep for testing
app.scheduler.notification-sweep-ms=10000
app.guardrail.bot-reply-cap=100
app.guardrail.max-comment-depth=20
app.guardrail.bot-cooldown-seconds=600
app.guardrail.notification-cooldown-seconds=900

logging.level.com.grid07=INFO
