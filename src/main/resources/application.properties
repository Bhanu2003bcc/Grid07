#  Server
server.port=8080

#  PostgreSQL
#jdbc:postgresql://localhost:5432/grid07db
#username : grid07user
#Password : grid07pass
spring.datasource.url= postgresql url
spring.datasource.username= Username
spring.datasource.password= password
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000


#  JPA / Hibernate

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false


#  Redis

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2


#  Scheduling

spring.task.scheduling.pool.size=5


#  App-level guardrail constants

app.guardrail.bot-reply-cap=100
app.guardrail.max-comment-depth=20
app.guardrail.bot-cooldown-seconds=600
app.guardrail.notification-cooldown-seconds=900
app.scheduler.notification-sweep-ms=300000


#  Logging

logging.level.com.grid07=INFO
logging.level.org.springframework.data.redis=WARN
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
